# LogMaster Agent Configuration

devices:
  - name: /dev/ttyUSB0
    baud_rate: 115200
    data_bits: 8
    stop_bits: 1
    parity: none

ollama:
  endpoint: http://localhost:11434
  model: qwen2.5:7b

rules:
  - name: crash
    keywords: [panic, crash, fatal]
    pattern: ""
    severity: ERROR
    category: crash

  - name: memory_error
    keywords: [OOM, out of memory, memory]
    pattern: ""
    severity: ERROR
    category: memory

  - name: timeout
    keywords: [timeout, timed out]
    pattern: ""
    severity: WARN
    category: network

  - name: disk_error
    keywords: [disk, I/O error]
    pattern: ""
    severity: ERROR
    category: storage