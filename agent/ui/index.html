<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LogMaster Agent - 串口调试工具</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif; background: #1e1e1e; color: #ccc; height: 100vh; display: flex; flex-direction: column; }
.header { background: #2d2d2d; padding: 8px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #444; }
.header h1 { font-size: 16px; color: #fff; }
.header .version { font-size: 12px; color: #888; }
.main { display: flex; flex: 1; overflow: hidden; }
.left { width: 240px; min-width: 240px; background: #252526; display: flex; flex-direction: column; border-right: 1px solid #444; padding: 12px; gap: 8px; overflow-y: auto; }
.right { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.section { margin-bottom: 4px; }
.section-title { font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 6px; padding-bottom: 4px; border-bottom: 1px solid #333; }
label { font-size: 12px; color: #aaa; display: block; margin-bottom: 2px; }
select, input[type="text"] { width: 100%; padding: 6px 8px; background: #3c3c3c; color: #ddd; border: 1px solid #555; border-radius: 4px; font-size: 13px; outline: none; }
select:focus, input:focus { border-color: #007acc; }
.btn { padding: 6px 12px; border: 1px solid #555; border-radius: 4px; cursor: pointer; font-size: 12px; background: #3c3c3c; color: #ddd; }
.btn:hover { background: #4c4c4c; }
.btn-primary { background: #007acc; border-color: #007acc; color: #fff; }
.btn-primary:hover { background: #1a8cd8; }
.btn-danger { background: #c0392b; border-color: #c0392b; color: #fff; }
.btn-danger:hover { background: #e74c3c; }
.btn-success { background: #27ae60; border-color: #27ae60; color: #fff; }
.btn-success:hover { background: #2ecc71; }
.btn-group { display: flex; gap: 4px; flex-wrap: wrap; }
.btn-group .btn { flex: 1; min-width: 60px; }
.toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 4px 0; }
.toggle-row label { font-size: 12px; margin: 0; }
.toggle { position: relative; width: 36px; height: 20px; }
.toggle input { display: none; }
.toggle .slider { position: absolute; inset: 0; background: #555; border-radius: 10px; cursor: pointer; transition: .2s; }
.toggle .slider::before { content: ''; position: absolute; width: 16px; height: 16px; left: 2px; top: 2px; background: #fff; border-radius: 50%; transition: .2s; }
.toggle input:checked + .slider { background: #007acc; }
.toggle input:checked + .slider::before { transform: translateX(16px); }
.log-terminal { flex: 1; background: #0d0d0d; color: #0f0; font-family: 'Consolas', 'Courier New', monospace; font-size: 13px; padding: 8px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; }
.log-line { padding: 1px 0; }
.log-line .ts { color: #888; }
.send-area { display: flex; gap: 8px; padding: 8px 12px; background: #252526; border-top: 1px solid #444; align-items: center; }
.send-area input { flex: 1; }
.send-area .btn { padding: 6px 16px; }
.status-bar { background: #007acc; color: #fff; padding: 4px 12px; font-size: 12px; display: flex; justify-content: space-between; }
.status-bar .rx-tx { display: flex; gap: 16px; }
.preset-cmds { display: flex; flex-wrap: wrap; gap: 4px; }
.preset-cmds .btn { font-size: 11px; padding: 4px 8px; }
.preset-cmds .btn-del { padding: 4px 6px; font-size: 10px; background: #8b0000; }
.preset-cmds .btn-del:hover { background: #c0392b; }
.modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; justify-content: center; align-items: center; }
.modal.show { display: flex; }
.modal-content { background: #2d2d2d; border: 1px solid #555; border-radius: 8px; padding: 20px; width: 400px; max-height: 80vh; overflow-y: auto; }
.modal h3 { color: #fff; margin-bottom: 12px; }
.modal .cmd-row { display: flex; gap: 4px; margin-bottom: 6px; }
.modal .cmd-row input { flex: 1; }
.modal .btn { margin-top: 12px; }
</style>
</head>
<body>

<div class="header">
  <h1>LogMaster Agent - 串口调试工具</h1>
  <span class="version">v1.0</span>
</div>

<div class="main">
  <!-- 左侧配置面板 -->
  <div class="left">
    <div class="section">
      <div class="section-title">串口配置</div>
      <label>串口</label>
      <select id="port-select">
        <option value="">-- 选择串口 --</option>
      </select>
      <label>波特率</label>
      <select id="baud-rate">
        <option value="9600">9600</option>
        <option value="19200">19200</option>
        <option value="38400">38400</option>
        <option value="57600">57600</option>
        <option value="115200" selected>115200</option>
        <option value="230400">230400</option>
        <option value="460800">460800</option>
        <option value="921600">921600</option>
      </select>
    </div>

    <div class="section">
      <div class="section-title">更多串口设置</div>
      <label>数据位</label>
      <select id="data-bits">
        <option value="5">5</option>
        <option value="6">6</option>
        <option value="7">7</option>
        <option value="8" selected>8</option>
      </select>
      <label>停止位</label>
      <select id="stop-bits">
        <option value="1" selected>1</option>
        <option value="2">2</option>
      </select>
      <label>校验位</label>
      <select id="parity">
        <option value="none" selected>none</option>
        <option value="odd">odd</option>
        <option value="even">even</option>
        <option value="mark">mark</option>
        <option value="space">space</option>
      </select>
    </div>

    <div class="btn-group">
      <button class="btn btn-success" id="btn-connect" onclick="connect()">连接</button>
      <button class="btn btn-danger" id="btn-disconnect" onclick="disconnect()" disabled>断开</button>
    </div>
    <div class="btn-group">
      <button class="btn" onclick="clearLog()">清屏</button>
      <button class="btn" onclick="refreshPorts()">刷新</button>
    </div>

    <div class="section">
      <div class="section-title">显示选项</div>
      <div class="toggle-row">
        <label>HEX显示</label>
        <label class="toggle"><input type="checkbox" id="hex-mode"><span class="slider"></span></label>
      </div>
      <div class="toggle-row">
        <label>时间戳</label>
        <label class="toggle"><input type="checkbox" id="timestamp-mode" checked><span class="slider"></span></label>
      </div>
      <div class="toggle-row">
        <label>自动滚动</label>
        <label class="toggle"><input type="checkbox" id="auto-scroll" checked><span class="slider"></span></label>
      </div>
    </div>

    <div class="section">
      <div class="section-title">预设命令 <button class="btn" style="font-size:10px;padding:2px 6px;" onclick="openPresetEditor()">编辑</button></div>
      <div class="preset-cmds" id="preset-buttons"></div>
    </div>
  </div>

  <!-- 右侧日志区域 -->
  <div class="right">
    <div class="log-terminal" id="log-terminal">
      <div class="log-line"><span class="ts">--- 等待连接串口 ---</span></div>
    </div>
    <div class="send-area">
      <button class="btn" id="send-mode-btn" onclick="toggleSendMode()">STR</button>
      <input type="text" id="send-input" placeholder="输入要发送的命令..." onkeydown="if(event.key==='Enter')sendData()">
      <button class="btn btn-primary" onclick="sendData()">发送</button>
    </div>
    <div class="status-bar">
      <span id="status-text">未连接</span>
      <span class="rx-tx">
        <span>RX: <b id="rx-count">0</b></span>
        <span>TX: <b id="tx-count">0</b></span>
      </span>
    </div>
  </div>
</div>

<!-- 预设命令编辑弹窗 -->
<div class="modal" id="preset-modal">
  <div class="modal-content">
    <h3>编辑预设命令</h3>
    <div id="preset-editor"></div>
    <button class="btn" onclick="addPresetRow()">+ 添加命令</button>
    <br>
    <button class="btn btn-primary" onclick="savePresets()">保存</button>
    <button class="btn" onclick="closePresetEditor()">取消</button>
  </div>
</div>

<script>
// 状态
let ws = null;
let connected = false;
let sendMode = 'str'; // 'str' 或 'hex'
let presets = JSON.parse(localStorage.getItem('serial-presets') || '["ls /","ping","help","reboot","status","log"]');

// 初始化
function init() {
  refreshPorts();
  renderPresets();
  setInterval(refreshPorts, 3000);
}

// 刷新串口列表
async function refreshPorts() {
  try {
    const res = await fetch('/api/ports');
    const json = await res.json();
    if (json.ok) {
      const select = document.getElementById('port-select');
      const current = select.value;
      select.innerHTML = '<option value="">-- 选择串口 --</option>';
      (json.data || []).forEach(p => {
        select.innerHTML += `<option value="${p}" ${p === current ? 'selected' : ''}>${p}</option>`;
      });
    }
  } catch (e) {
    console.error('获取串口列表失败:', e);
  }
}

// 连接串口
async function connect() {
  const device = document.getElementById('port-select').value;
  if (!device) { alert('请选择串口'); return; }

  const body = {
    device: device,
    baud_rate: parseInt(document.getElementById('baud-rate').value),
    data_bits: parseInt(document.getElementById('data-bits').value),
    stop_bits: parseInt(document.getElementById('stop-bits').value),
    parity: document.getElementById('parity').value
  };

  try {
    const res = await fetch('/api/connect', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const json = await res.json();
    if (json.ok) {
      setConnected(true);
      connectWebSocket();
      updateStatus(json.data);
    } else {
      alert('连接失败: ' + json.error);
    }
  } catch (e) {
    alert('连接失败: ' + e.message);
  }
}

// 断开串口
async function disconnect() {
  try {
    await fetch('/api/disconnect', { method: 'POST' });
  } catch (e) {}
  setConnected(false);
  if (ws) { ws.close(); ws = null; }
  appendLog('--- 已断开连接 ---');
  updateStatus({ connected: false });
}

// WebSocket 连接
function connectWebSocket() {
  if (ws) { ws.close(); }
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host + '/ws');

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'log') {
      appendLog(formatLog(msg));
    } else if (msg.type === 'status') {
      updateStatus(msg.status);
    }
  };

  ws.onclose = () => {
    if (connected) {
      appendLog('--- WebSocket 断开，尝试重连... ---');
      setTimeout(() => { if (connected) connectWebSocket(); }, 2000);
    }
  };
}

// 格式化日志行
function formatLog(msg) {
  const hexMode = document.getElementById('hex-mode').checked;
  const tsMode = document.getElementById('timestamp-mode').checked;
  let content = msg.content;

  if (hexMode) {
    content = Array.from(new TextEncoder().encode(content))
      .map(b => b.toString(16).padStart(2, '0').toUpperCase()).join(' ');
  }

  if (tsMode) {
    return `<span class="ts">[${msg.timestamp}]</span> ${escapeHtml(content)}`;
  }
  return escapeHtml(content);
}

// 添加日志到终端
function appendLog(html) {
  const term = document.getElementById('log-terminal');
  const div = document.createElement('div');
  div.className = 'log-line';
  div.innerHTML = html;
  term.appendChild(div);

  if (document.getElementById('auto-scroll').checked) {
    term.scrollTop = term.scrollHeight;
  }
}

// 清屏
function clearLog() {
  document.getElementById('log-terminal').innerHTML = '';
}

// 发送数据
async function sendData() {
  const input = document.getElementById('send-input');
  const data = input.value;
  if (!data) return;

  const body = { data: data, mode: sendMode };

  try {
    const res = await fetch('/api/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const json = await res.json();
    if (json.ok) {
      input.value = '';
    } else {
      alert('发送失败: ' + json.error);
    }
  } catch (e) {
    alert('发送失败: ' + e.message);
  }
}

// 切换发送模式
function toggleSendMode() {
  sendMode = sendMode === 'str' ? 'hex' : 'str';
  document.getElementById('send-mode-btn').textContent = sendMode.toUpperCase();
}

// 更新状态显示
function updateStatus(s) {
  if (s.connected) {
    document.getElementById('status-text').textContent = '已连接: ' + s.device + ' @ ' + s.baud_rate;
  } else {
    document.getElementById('status-text').textContent = '未连接';
  }
  document.getElementById('rx-count').textContent = s.rx_count || 0;
  document.getElementById('tx-count').textContent = s.tx_count || 0;
}

// 设置连接状态
function setConnected(c) {
  connected = c;
  document.getElementById('btn-connect').disabled = c;
  document.getElementById('btn-disconnect').disabled = !c;
  document.getElementById('port-select').disabled = c;
  document.getElementById('baud-rate').disabled = c;
  document.getElementById('data-bits').disabled = c;
  document.getElementById('stop-bits').disabled = c;
  document.getElementById('parity').disabled = c;
}

// 渲染预设命令按钮
function renderPresets() {
  const container = document.getElementById('preset-buttons');
  container.innerHTML = presets.map((cmd, i) =>
    `<button class="btn" onclick="sendPreset('${escapeHtml(cmd).replace(/'/g, "\\'")}')" title="${escapeHtml(cmd)}">${escapeHtml(cmd).substring(0, 12)}${cmd.length > 12 ? '...' : ''}</button>`
  ).join('');
}

// 发送预设命令
function sendPreset(cmd) {
  document.getElementById('send-input').value = cmd;
  sendData();
}

// 打开预设命令编辑器
function openPresetEditor() {
  const editor = document.getElementById('preset-editor');
  editor.innerHTML = presets.map((cmd, i) =>
    `<div class="cmd-row">
      <input type="text" value="${escapeHtml(cmd)}" data-index="${i}">
      <button class="btn btn-del" onclick="removePresetRow(${i})">X</button>
    </div>`
  ).join('');
  document.getElementById('preset-modal').classList.add('show');
}

// 关闭预设编辑器
function closePresetEditor() {
  document.getElementById('preset-modal').classList.remove('show');
}

// 添加预设命令行
function addPresetRow() {
  const editor = document.getElementById('preset-editor');
  const idx = editor.children.length;
  editor.innerHTML += `<div class="cmd-row">
    <input type="text" value="" data-index="${idx}">
    <button class="btn btn-del" onclick="removePresetRow(${idx})">X</button>
  </div>`;
}

// 删除预设命令行
function removePresetRow(idx) {
  const editor = document.getElementById('preset-editor');
  const rows = editor.querySelectorAll('.cmd-row');
  rows[idx]?.remove();
}

// 保存预设
function savePresets() {
  const inputs = document.querySelectorAll('#preset-editor input');
  presets = Array.from(inputs).map(i => i.value).filter(v => v.trim());
  localStorage.setItem('serial-presets', JSON.stringify(presets));
  renderPresets();
  closePresetEditor();
}

// HTML 转义
function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

// 启动
init();
</script>
</body>
</html>
