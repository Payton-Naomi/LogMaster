agent_id: pc-agent-01
project_id: logmaster

upload:
  url: http://127.0.0.1:8081/api/v1/logs/upload
  interval: 5m
  batch_size: 500
  timeout: 15s
  token: ""

storage:
  sqlite_path: data/agent.db
  log_dir: logs

devices:
  - device_sn: DUT001
    source: serial
    port: COM24
    baud_rate: 115200
    data_bits: 8
    stop_bits: 1
    parity: none
    flow_control: none
    encoding: utf-8
    read_timeout: 200ms
    idle_flush: 100ms
    max_line_bytes: 1048576

  # Enable this device when no serial hardware is available.
  # - device_sn: SIM001
  #   source: mock
  #   mock_interval: 500ms
