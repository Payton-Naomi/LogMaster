<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>日志分析平台</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      color: #1f2937;
      background: #f4f7fb;
    }

    header {
      border-bottom: 1px solid #dbe3ef;
      background: #ffffff;
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: min(1100px, calc(100% - 32px));
      min-height: 64px;
      margin: 0 auto;
      gap: 16px;
      padding: 12px 0;
    }

    .brand {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .user {
      display: none;
      align-items: center;
      gap: 10px;
      color: #475569;
      font-size: 14px;
    }

    .avatar {
      display: grid;
      width: 34px;
      height: 34px;
      place-items: center;
      border-radius: 50%;
      color: #ffffff;
      background: #2563eb;
      font-weight: 700;
    }

    main {
      width: min(1100px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 48px;
    }

    .login-panel,
    .app-panel {
      border: 1px solid #dbe3ef;
      border-radius: 8px;
      background: #ffffff;
    }

    .login-panel {
      display: grid;
      min-height: 360px;
      place-items: center;
      padding: 32px;
      text-align: center;
    }

    .login-box {
      width: min(420px, 100%);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 30px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .login-copy {
      margin: 0 0 24px;
      color: #64748b;
      line-height: 1.6;
    }

    .app-panel {
      display: none;
      padding: 24px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
    }

    .status {
      min-height: 24px;
      color: #64748b;
      font-size: 14px;
    }

    button {
      min-width: 112px;
      height: 40px;
      border: 0;
      border-radius: 6px;
      color: #ffffff;
      background: #2563eb;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    button:disabled {
      cursor: wait;
      opacity: 0.7;
    }

    .secondary {
      color: #2563eb;
      background: #eff6ff;
    }

    .secondary:hover {
      background: #dbeafe;
    }

    .outputs {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .output {
      min-height: 360px;
      padding: 16px;
      border: 1px solid #dbe3ef;
      border-radius: 8px;
      background: #ffffff;
    }

    .output h2 {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0;
    }

    textarea {
      width: 100%;
      height: 300px;
      resize: vertical;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      padding: 12px;
      font: 15px/1.5 Consolas, "Courier New", monospace;
      color: #0f172a;
      background: #f8fafc;
    }

    @media (max-width: 760px) {
      .toolbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .outputs {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="brand">日志分析平台</div>
      <div class="user" id="userInfo">
        <div class="avatar" id="userAvatar">飞</div>
        <div>
          <div id="userName">未登录</div>
          <div id="userEmail"></div>
        </div>
        <button class="secondary" id="logoutBtn" type="button">退出</button>
      </div>
    </div>
  </header>

  <main>
    <section class="login-panel" id="loginPanel">
      <div class="login-box">
        <h1>飞书登录</h1>
        <p class="login-copy">点击按钮跳转到飞书授权页，授权完成后会自动回到本系统。</p>
        <button id="loginBtn" type="button">飞书扫码登录</button>
      </div>
    </section>

    <section class="app-panel" id="appPanel">
      <div class="toolbar">
        <div class="status" id="status">登录成功后，可以启动实时日志输出。</div>
        <button id="refreshBtn" type="button">重新运行</button>
      </div>

      <section class="outputs" aria-label="线程输出">
        <article class="output">
          <h2>线程 1</h2>
          <textarea id="box1" readonly></textarea>
        </article>
        <article class="output">
          <h2>线程 2</h2>
          <textarea id="box2" readonly></textarea>
        </article>
        <article class="output">
          <h2>线程 3</h2>
          <textarea id="box3" readonly></textarea>
        </article>
      </section>
    </section>
  </main>

  <script>
    const loginPanel = document.querySelector("#loginPanel");
    const appPanel = document.querySelector("#appPanel");
    const loginBtn = document.querySelector("#loginBtn");
    const logoutBtn = document.querySelector("#logoutBtn");
    const userInfo = document.querySelector("#userInfo");
    const userAvatar = document.querySelector("#userAvatar");
    const userName = document.querySelector("#userName");
    const userEmail = document.querySelector("#userEmail");
    const statusEl = document.querySelector("#status");
    const refreshBtn = document.querySelector("#refreshBtn");
    const boxes = [
      document.querySelector("#box1"),
      document.querySelector("#box2"),
      document.querySelector("#box3"),
    ];
    let source = null;
    let finishedCount = 0;

    function setLoggedIn(user) {
      loginPanel.style.display = "none";
      appPanel.style.display = "block";
      userInfo.style.display = "flex";
      userAvatar.textContent = user.avatar || user.name.slice(0, 1);
      userName.textContent = user.name;
      userEmail.textContent = user.email || "";
      statusEl.textContent = "登录成功，可以启动实时输出。";
    }

    function setLoggedOut() {
      if (source) {
        source.close();
      }

      loginPanel.style.display = "grid";
      appPanel.style.display = "none";
      userInfo.style.display = "none";
      boxes.forEach((box) => {
        box.value = "";
      });
    }

    async function loginWithFeishu() {
      loginBtn.disabled = true;

      try {
        const response = await fetch("/api/auth/feishu-url");
        const result = await response.json();

        if (result.code !== 0) {
          throw new Error(result.message);
        }

        window.location.href = result.data.url;
      } catch (error) {
        alert("获取飞书登录地址失败，请检查后端环境变量。");
        loginBtn.disabled = false;
      }
    }

    async function logout() {
      await fetch("/api/auth/logout", {
        method: "POST",
      });
      setLoggedOut();
    }

    async function loadCurrentUser() {
      try {
        const response = await fetch("/api/user/info");

        if (!response.ok) {
          setLoggedOut();
          return;
        }

        const result = await response.json();

        if (result.code !== 0) {
          setLoggedOut();
          return;
        }

        setLoggedIn(result.data);
      } catch (error) {
        setLoggedOut();
      }
    }

    function appendToBox(boxNumber, text) {
      const box = document.querySelector(`#box${boxNumber}`);
      box.value += text;
      box.scrollTop = box.scrollHeight;
    }

    function startStream() {
      if (source) {
        source.close();
      }

      finishedCount = 0;
      refreshBtn.disabled = true;
      statusEl.textContent = "正在实时接收三个 goroutine 的输出...";
      boxes.forEach((box) => {
        box.value = "";
      });

      source = new EventSource("/api/stream");

      source.onmessage = (event) => {
        const message = JSON.parse(event.data);
        appendToBox(message.box, message.text);

        if (message.done) {
          finishedCount += 1;
        }

        if (finishedCount === 3) {
          statusEl.textContent = "三个线程都运行完成。";
          refreshBtn.disabled = false;
          source.close();
        }
      };

      source.onerror = () => {
        statusEl.textContent = "连接已结束、未登录或后端未运行。";
        refreshBtn.disabled = false;

        if (source) {
          source.close();
        }
      };
    }

    loginBtn.addEventListener("click", loginWithFeishu);
    logoutBtn.addEventListener("click", logout);
    refreshBtn.addEventListener("click", startStream);
    loadCurrentUser();
  </script>
</body>
</html>
